<!DOCTYPE html>
<html>
<head>
    <title>EMI Calculator</title>
</head>
<body>
    <h2>EMI Calculator</h2>

    Loan Amount: <input type="number" id="loan"><br><br>
    Interest Rate (%): <input type="number" id="rate"><br><br>
    Time (years): <input type="number" id="time"><br><br>

    <button onclick="calculateEMI()">Calculate EMI</button>

    <h3 id="result"></h3>

    <script>
        function calculateEMI() {
            let P = document.getElementById("loan").value;
            let R = document.getElementById("rate").value / 12 / 100;
            let N = document.getElementById("time").value * 12;

            let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

            document.getElementById("result").innerText = "EMI: " + EMI.toFixed(2);
        }
    </script>
</body>
</html>
